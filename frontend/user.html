<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户中心 - 资源下载站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <div class="logo">🎯 资源下载站</div>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="tool.html">工具板块</a></li>
        <li><a href="game.html">精品游戏</a></li>
        <li><a href="user.html" id="navUser">登录</a></li>
      </ul>
    </div>
  </nav>

  <div class="container" style="max-width:700px;margin:40px auto;padding:0 20px" id="userContent">
    <!-- JS 渲染 -->
  </div>

  <!-- VIP 支付弹窗 -->
  <div class="modal-overlay" id="payModal">
    <div class="modal-box">
      <h3 id="payModalTitle">开通会员</h3>
      <p id="payModalDesc">支付成功后立即开通</p>
      <div style="font-size:1.6rem;font-weight:700;color:#e84118;margin-bottom:16px" id="payModalAmount"></div>
      <div class="pay-methods">
        <button class="pay-btn active" data-method="wechat" onclick="selectPay('wechat')">💳 微信</button>
        <button class="pay-btn" data-method="alipay" onclick="selectPay('alipay')">📱 支付宝</button>
      </div>
      <div class="qr-code" id="qrDisplay">💳</div>
      <p class="modal-note">← 选择支付方式显示收款码</p>
      <button class="btn btn-primary btn-block" onclick="simulateVipPaid()" style="margin-top:16px">我已支付（模拟）</button>
      <div class="modal-close" onclick="closeModal()">取消</div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    renderUserCenter();
    updateNavUser();
  </script>
</body>
</html>
