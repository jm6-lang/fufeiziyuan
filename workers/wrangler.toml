name = "paid-download-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 命名空间：用户数据、Session token、已购资源
# 创建方式：Cloudflare Dashboard → Workers & Pages → KV → 创建命名空间
# 把右侧显示的 ID 填到 id 后面（格式：xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx）
[[kv_namespaces]]
binding = "USERS_KV"
id = "YOUR_KV_NAMESPACE_ID_HERE"

# R2 Bucket：存储资源文件
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "paid-resources"

[vars]
# 开发环境密码盐（生产必须改掉）
PASSWORD_SALT = "dev-salt-change-in-production"

# ===== 生产环境必须通过以下命令设置 secret =====
# wrangler secret put PASSWORD_SALT
# （输入一个随机字符串，至少32位）

# ===== 支付平台（接入时设置）=====
# LemonSqueezy（推荐，对中国开发者友好）
# LEMONSQUEEZY_API_KEY = "your-api-key"
# LEMONSQUEEZY_STORE_ID = "your-store-id"
# LEMONSQUEEZY_WEBHOOK_SECRET = "your-webhook-secret"
# 通过 `wrangler secret put` 设置以上值
